{{- if .Values.secretsManager.enabled }}
# ExternalSecret pulls Docker Hub credentials from AWS Secrets Manager and
# materialises them as a kubernetes.io/dockerconfigjson secret. This allows
# EKS nodes to pull private images from the carnotresearch Docker Hub org.
#
# Requires the same ClusterSecretStore (aws-secrets-manager) used by the
# main ExternalSecret. The ESO IRSA role already covers carnot/* so no
# additional IAM changes are needed.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dockerhub-pull-secret
  namespace: {{ .Values.env }}
  labels:
    app.kubernetes.io/name: carnot
    app.kubernetes.io/instance: {{ .Values.env }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: carnot-{{ .Chart.Version }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: dockerhub-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: >-
          {"auths":{"https://index.docker.io/v1/":{"username":"{{ "{{" }} .username {{ "}}" }}","password":"{{ "{{" }} .token {{ "}}" }}","auth":"{{ "{{" }} printf "%s:%s" .username .token | b64enc {{ "}}" }}"}}}
  data:
    - secretKey: username
      remoteRef:
        key: carnot/dockerhub
        property: username
    - secretKey: token
      remoteRef:
        key: carnot/dockerhub
        property: token
{{- end }}
