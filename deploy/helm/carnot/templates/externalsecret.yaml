{{- if .Values.secretsManager.enabled }}
# ExternalSecret pulls credentials from AWS Secrets Manager and materialises
# them as a Kubernetes Secret named 'carnot-secrets'. This Secret is consumed
# by both the backend Deployment and the PostgreSQL StatefulSet.
#
# Requires the External Secrets Operator and a ClusterSecretStore to be
# installed on the cluster before deploying this chart.
#
# For local development (secretsManager.enabled=false), create the Secret manually:
#   kubectl create secret generic carnot-secrets -n <env> \
#     --from-literal=db_user=... \
#     --from-literal=db_password=... \
#     --from-literal=db_name=... \
#     --from-literal=settings_encryption_key=...
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: carnot-secrets
  namespace: {{ .Values.env }}
  labels:
    app.kubernetes.io/name: carnot
    app.kubernetes.io/instance: {{ .Values.env }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: carnot-{{ .Chart.Version }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: carnot-secrets
    creationPolicy: Owner
  data:
    - secretKey: db_user
      remoteRef:
        key: {{ .Values.secretsManager.dbSecretName }}
        property: db_user
    - secretKey: db_password
      remoteRef:
        key: {{ .Values.secretsManager.dbSecretName }}
        property: db_password
    - secretKey: settings_encryption_key
      remoteRef:
        key: {{ .Values.secretsManager.appSecretName }}
        property: settings_encryption_key
{{- end }}
