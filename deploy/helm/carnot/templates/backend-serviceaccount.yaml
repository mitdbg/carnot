apiVersion: v1
kind: ServiceAccount
metadata:
  name: carnot-backend
  namespace: {{ .Values.env }}
  labels:
    app.kubernetes.io/name: carnot
    app.kubernetes.io/instance: {{ .Values.env }}
    app.kubernetes.io/component: backend
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    helm.sh/chart: carnot-{{ .Chart.Version }}
  {{- if .Values.irsa.roleArn }}
  annotations:
    # IRSA: links this ServiceAccount to an IAM role, granting the backend pod
    # AWS credentials scoped to this environment's S3 bucket and Secrets Manager path.
    eks.amazonaws.com/role-arn: {{ .Values.irsa.roleArn }}
  {{- end }}
