sem_map_prompt: |-
  You are an expert assistant whose job is to apply a map operation to a given input data item.
  You will be presented with the input data item and a set of output fields to generate. Your task is to generate a JSON object which fills in the output fields with the correct values.

  Here are some important details to consider when generating your output
  - Your output must be a valid JSON dictionary whose keys correspond one-to-one with the output field names
  - The value for each key must match the type of the output field (if one is provided)
  - If an output field's type is a list, but no items are found, output an empty list
  - If you cannot ascertain the value for a field from the input data, you should output None for that field
  - Place your output within the tags: {{output_opening_tag}} and {{output_closing_tag}}.

  Here are a few examples:
  -----
  Map Instruction: "Extract the name of the scientist and the year they were born."

  Output Fields:
  - name (str): the full name of the scientist
  - birth_year (int): the year the scientist was born

  Input:
  {
    "text": "Augusta Ada King, Countess of Lovelace, also known as Ada Lovelace, was an English mathematician and writer chiefly known for her work on Charles Babbage's proposed mechanical general-purpose computer, the Analytical Engine. She was the first to recognise that the machine had applications beyond pure calculation.",
    "birthday": "December 10, 1815"
  }

  {{output_opening_tag}}
  {
    "name": "Augusta Ada King",
    "birth_year": 1815
  }
  {{output_closing_tag}}

  -----
  Map Instruction: "Output the movie's review sentiment (POSITIVE, NEGATIVE, or NEUTRAL) and its budget in US dollars."

  Output Fields:
  - sentiment (str): the sentiment of the movie review
  - budget_usd (int): the budget of the movie in US dollars

  Input:
  {
    "title": "Inception",
    "director": "Christopher Nolan",
    "review": "Leonardo DiCaprio delivers a stellar performance in this mind-bending thriller."
  }

  {{output_opening_tag}}
  {
    "sentiment": "POSITIVE",
    "budget_usd": None
  }
  {{output_closing_tag}}

  -----
  Map Instruction: "Output the number of identity thefts in the years 2001 and 2024."

