  {{code_block_opening_tag}}
  # convert the lead_actor_reviews dictionary into a list of dictionaries for final answer
  final_items = []
  for movie_title, reviews in lead_actor_reviews.items():
      final_items.append({"movie_title": movie_title, "reviews": reviews})
  final_answer({"final_items": final_items,
                "final_answer_str": f"Found lead actor reviews for {len(final_items)} movies."})
  {{code_block_closing_tag}}

  -----
  Task: "Compute the geometric mean of temperature readings from all sensors at Boston beaches."

  Tools:
  {{code_block_opening_tag}}
  def final_answer(answer: any) -> any:
    """Provides a final answer to the given problem.

    Args:
        answer: The final answer to the problem
    """

  def geometric_mean(numbers: list[float]) -> float:
      """Computes the geometric mean of a list of numbers.
      
      Args:
          numbers: A list of float numbers.
      """

  def get_beach_city(sensor_id: str) -> str:
      """Returns the city of the beach where the sensor is located.
      
      Args:
          sensor_id: The ID of the sensor.
      """
  {{code_block_closing_tag}}

  Input Datasets:
  ---
  Dataset Name: Temperature Readings
  Annotation: A dataset containing temperature readings from various sensors located at beaches around the world.
  Number of Items: 10000
  Index: no
  Code that Generated Code State: None
  Available Code State Vars: []

  Dataset Name: CodeOperation1
  Annotation: Code operator output for task: "Clean the temperature readings by removing invalid entries."
  Number of Items: 0
  Index: no
  Code that Generated Code State:
  {{code_block_opening_tag}}
  import pandas as pd
  
  temp_readings = input_datasets["Temperature Readings"].items
  cleaned_readings = []
  for reading in temp_readings:
      clean_reading = {}
      clean_reading['sensor_id'] = reading['sensor_id']
      try:
          clean_reading['temperature'] = float(reading['temperature'])
      except (ValueError, TypeError):
          clean_reading['temperature'] = None
      if clean_reading['temperature'] is not None:
          cleaned_readings.append(clean_reading)

  temp_df = pd.DataFrame(cleaned_readings)
  final_answer({"temp_df": temp_df})
  {{code_block_closing_tag}}
  Available Code State Vars: ['temp_df']

  Dataset Name: CodeOperation2
  Annotation: Code operator output for task: "Compute the geometric mean of temperature readings from all sensors at Boston beaches."
  Number of Items: 0
  Index: no
  Code that Generated Code State:
  {{code_block_opening_tag}}
  temp_df = input_datasets["Cleaned Temperature Readings"].code_state["temp_df"]
  boston_temps = []
  for _, row in temp_df.iterrows():
      sensor_id = row['sensor_id']
      city = get_beach_city(sensor_id)
      if city.lower() == "boston":
          boston_temps.append(row['temperature'])
  geo_mean = geometric_mean(boston_temps)
  final_answer({"geometric_mean_boston_temps": geo_mean})
  {{code_block_closing_tag}}
  ---

  {{code_block_opening_tag}}
