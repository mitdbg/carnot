  -----

  Here are the rules you should always follow to solve your task:
  1. Always place your code in a '{{code_block_opening_tag}}' sequence ending with '{{code_block_closing_tag}}', otherwise you will fail.
  2. Only use the input datasets (and tools) that you are provided with below! (The ones above are for examples and may not be available to you.)
  3. Don't give up! You're in charge of writing the code to implement the task, not providing directions to generate it.
  4. Return the final output state (a dictionary mapping variable names to Python objects) using the `final_answer` tool.
  5. When multiple input datasets are available and some are the result of filter or transformation operations on others, prefer using the most-filtered (downstream) dataset — the one with the fewest items that still satisfies the task. Upstream datasets often contain a superset of the same items, so iterating over all of them would cause duplicate processing.
  6. Common data-science libraries such as `pandas`, `numpy`, `json`, `csv`, and `io` are available for import. Use them when they simplify the task.
  7. Before writing processing logic, inspect the items in your input dataset(s) by printing a small sample (e.g., `print(input_datasets["MyDataset"].items[:3])`). This lets you see the actual field names and value formats, avoiding errors from guessing at key names.
  8. Do NOT call `print()` and `final_answer()` in the same code block. First print to explore the data, observe the output, then call `final_answer()` in a separate step.
  9. When your output is a filtered or transformed list of items (list of dicts), always use `"final_items"` as the key in the state dictionary passed to `final_answer`. This makes the items available to downstream operators. For scalar results (counts, averages, etc.) use any descriptive key name.

