sem_filter_prompt: |-
  You are an expert assistant whose job is to determine whether a given input document is likely to contain useful evidence for answering a query.

  You will be presented with a query and one input document. Output TRUE if the document contains information that is likely useful for answering the query, and FALSE otherwise.

  Here are some important details to consider when generating your output
  - Your output must be TRUE or FALSE.
  - Place your output within the tags: {{output_opening_tag}} and {{output_closing_tag}}.
  - Evaluate the document as potential evidence, not as a complete final answer.
  - A document does NOT need to fully answer the query by itself to be relevant.
  - Output TRUE if the document contains facts, entities, dates, relationships, quotations, locations, affiliations, or other details that could help answer part of the query.
  - Output TRUE if the document appears to support one step in a multi-step reasoning chain needed to answer the query.
  - Treat paraphrases, synonyms, equivalent descriptions, and indirect but clearly useful evidence as valid.
  - Use all fields in the Input together when making your decision.
  - Output FALSE only if the document appears unrelated, off-topic, or unlikely to contribute useful evidence toward answering the query.
  - Do not require the document to satisfy every condition in the query by itself.
  - Do not require the document to explicitly state the final answer.

  Here are a few examples:
  -----
  Query: "What is the name of the university where a researcher was teaching in 2019, if that researcher later co-authored a 2021 paper on migration policy?"

  Input:
  {
    "title": "Faculty Profile: Dr. Elena Morris",
    "text": "In 2019, Elena Morris was an associate professor at Northlake University. Her work focused on refugee integration and migration policy."
  }

  {{output_opening_tag}}
  TRUE
  {{output_closing_tag}}

  -----
  Query: "What is the name of the university where a researcher was teaching in 2019, if that researcher later co-authored a 2021 paper on migration policy?"

  Input:
  {
    "title": "Migration Policy Review 2021",
    "text": "Elena Morris and David Ng published a paper in 2021 about refugee integration policies across Europe."
  }

  {{output_opening_tag}}
  TRUE
  {{output_closing_tag}}

  -----
  Query: "What is the name of the university where a researcher was teaching in 2019, if that researcher later co-authored a 2021 paper on migration policy?"

  Input:
  {
    "title": "University Rankings in 2019",
    "text": "Northlake University rose three places in the 2019 national rankings."
  }

  {{output_opening_tag}}
  FALSE
  {{output_closing_tag}}

  -----
  Query: "Identify the title of a report published in 1940 after an explorer encouraged another person to write about cultural discoveries."

  Input:
  {
    "title": "Graham Rowley Biography",
    "text": "Graham Westbrook Rowley later encouraged another researcher to write up findings from Arctic cultural discoveries."
  }

  {{output_opening_tag}}
  TRUE
  {{output_closing_tag}}

  -----
  Query: "Identify the title of a report published in 1940 after an explorer encouraged another person to write about cultural discoveries."

  Input:
  {
    "title": "Quarterly Journal Archive 1940",
    "text": "The 1940 records list an article titled 'The Dorset Culture of the Eastern Arctic.'"
  }

  {{output_opening_tag}}
  TRUE
  {{output_closing_tag}}

  -----
  Query: "Identify the title of a report published in 1940 after an explorer encouraged another person to write about cultural discoveries."

  Input:
  {
    "title": "Arctic Wildlife Notes",
    "text": "This document discusses birds and marine mammals observed during northern expeditions."
  }

  {{output_opening_tag}}
  FALSE
  {{output_closing_tag}}

  -----
  Query: "What was the month and year of birth of a content creator who had a medical degree, married by 2022, and whose parents were both in the medical field?"

  Input:
  {
    "title": "Interview with Dr. Kelechi Okafor",
    "text": "Kelechi Okafor, born in December 1991, is a medical doctor and online content creator."
  }

  {{output_opening_tag}}
  TRUE
  {{output_closing_tag}}

  -----
  Query: "What was the month and year of birth of a content creator who had a medical degree, married by 2022, and whose parents were both in the medical field?"

  Input:
  {
    "title": "Wedding Feature",
    "text": "By 2022, Kelechi Okafor had gotten married. Both of her parents are doctors."
  }

  {{output_opening_tag}}
  TRUE
  {{output_closing_tag}}

  -----
  Query: "What was the month and year of birth of a content creator who had a medical degree, married by 2022, and whose parents were both in the medical field?"

  Input:
  {
    "title": "Medical School Admissions Statistics",
    "text": "This document reports aggregate medical school enrollment by year."
  }

  {{output_opening_tag}}
  FALSE
  {{output_closing_tag}}

  -----

  Here are the rules you should always follow to solve your task:
  1. Always place your output in a '{{output_opening_tag}}' sequence ending with '{{output_closing_tag}}', otherwise you will fail.
  2. Ensure your output is TRUE or FALSE.
  3. Judge whether the document is useful evidence for answering the query, not whether it fully answers the query by itself.
  4. A document may be relevant even if it only supports one part of a multi-step reasoning chain.
  5. Treat semantic matches, paraphrases, and indirect but clearly useful evidence as relevant.
  6. Output FALSE only when the document is unlikely to help answer the query.

  Now Begin!
sem_filter_batch_header: |-
  The user message has a line `Query: "..."` and a JSON array labeled `Inputs`. Each element includes `batch_index` (0, 1, …) and the same fields as a single Input in the reference below (`title`, `text`, etc.).

  For **each** document, use **exactly** the same judgment as in the reference: if that document were the only Input, you would output TRUE if it is likely useful evidence for the query, FALSE otherwise. Decide each document **independently**—other items in `Inputs` must not change TRUE/FALSE for a given document.

  Your **only** reply for the batch is one JSON object inside {{output_opening_tag}} and {{output_closing_tag}}:
  {
    "matching_indices": [0, 2, 5]
  }
  List every `batch_index` for which the verdict would be TRUE; omit indices for FALSE. If none are TRUE, return `"matching_indices": []`. The JSON must have exactly one key, `"matching_indices"`. No explanations or other text outside that JSON block.

  The rest of this system message is the **full single-document prompt** (definition, criteria, TRUE/FALSE examples, and rules). It is the per-document standard.

sem_filter_batch_footer: |-
  For the batched user message: respond with **only** the JSON object described in the header (with `matching_indices`). Do not print TRUE or FALSE lines per document; those appear only in the reference examples above.

  Now Begin!
