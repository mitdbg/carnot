      "director": "Christopher Nolan",
      "review": "A confusing exploration of time manipulation, which is nearly impossible to follow.",
      "box_office": "$58.5M"
    }
  ]

  {{output_opening_tag}}
  {
    "sentiment": "POSITIVE",
    "box_office_usd": 448100000
  }
  {{output_closing_tag}}

