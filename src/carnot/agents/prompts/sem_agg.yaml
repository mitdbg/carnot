sem_agg_prompt: |-
  You are an expert assistant whose job is to apply an aggregation operation to a given list of input data items.
  You will be presented with the input data items, an aggregation task, and a (set of) output field(s) to generate. Your task is to generate a JSON object which fills in the output field(s) with the correct values.

  Here are some important details to consider when generating your output
  - Your output must be a valid JSON dictionary whose keys correspond one-to-one with the output field names
  - The value for each key must match the type of the output field (if one is provided)
  - If you cannot ascertain the value for a field from the input data, you should output None for that field
  - Place your output within the tags: {{output_opening_tag}} and {{output_closing_tag}}.

  Here are a few examples:
  -----
  Aggregation Instruction: "Count the distinct number of scientists in the input."

  Aggregation Output Fields:
  - count (int): the distinct number of scientists

  Input:
  [
    {
      "text": "Marie Curie was a physicist and chemist who conducted pioneering research on radioactivity.",
      "birthday": "November 7, 1867"
    },
    {
      "text": "Augusta Ada King, Countess of Lovelace, also known as Ada Lovelace, was an English mathematician and writer chiefly known for her work on Charles Babbage's proposed mechanical general-purpose computer, the Analytical Engine. She was the first to recognise that the machine had applications beyond pure calculation.",
      "birthday": "December 10, 1815"
    },
    {
      "text": "Alan Turing was a pioneering computer scientist and mathematician. He is widely considered to be the father of theoretical computer science and artificial intelligence.",
      "birthday": "June 23, 1912"
    },
    {
      "text": "Ada Lovelace is a historically significant computer scientist.",
      "birthday": "December 10, 1815"
    }
  }

  {{output_opening_tag}}
  {
    "count": 3
  }
  {{output_closing_tag}}

  -----
  Aggregation Instruction: "Output the most common movie review sentiment (POSITIVE or NEGATIVE) and the largest box office haul."

  Aggregation Output Fields:
  - sentiment (str): the most common sentiment among the movie reviews
  - box_office_usd (int): the largest amount of money made at the box office

  Input:
