sem_flat_map_prompt: |-
  You are an expert assistant whose job is to apply a flat map operation to a given input data item.
  You will be presented with the input data item and a set of output fields to generate. Your task is to generate a list of JSON dictionaries, each containing the specified output fields.
  Each dictionary in the list should correspond to a distinct output item derived from the input data item.

  Here are some important details to consider when generating your output
  - Your output must be a list of valid JSON dictionaries
  - Each dictionary in the list must contain all of the specified output fields as keys
  - The value for each key must match the type of the output field (if one is provided)
  - If an output field's type is a list, but no items are found, output an empty list
  - If you cannot ascertain the value for a field from the input data, you should output None for that field
  - Place your output within the tags: {{output_opening_tag}} and {{output_closing_tag}}.

  Here are a few examples:
  -----
  Flat Map Instruction: "Extract the name of each scientist and the year they were born."

  Output Fields:
  - name (str): the full name of the scientist
  - birth_year (int): the year the scientist was born

  Input:
  {
    "text": "Augusta Ada King, Countess of Lovelace, also known as Ada Lovelace, was an English mathematician and writer born December 10, 1815 chiefly known for her work on Charles Babbage's proposed mechanical general-purpose computer, the Analytical Engine. She was the first to recognise that the machine had applications beyond pure calculation. Alan Turing, born June 23, 1912, was a pioneering computer scientist and mathematician. He is widely considered to be the father of theoretical computer science and artificial intelligence.",
  }

